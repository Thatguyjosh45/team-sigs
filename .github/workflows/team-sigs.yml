name: Verify Team Signature

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  verify-signatures:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        id: get_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout Target Repo
        uses: actions/checkout@v4
        with:
          path: target-repo
          fetch-depth: 0

      - name: Checkout Sigs Repo
        uses: actions/checkout@v4
        with:
          repository: oreonhq/team-sigs
          path: team-sigs
          token: ${{ steps.get_token.outputs.token }}

      - name: Verify Commits
        env:
          GH_TOKEN: ${{ steps.get_token.outputs.token }}
        run: |
          cd target-repo

          git fetch origin pull/${{ github.event.pull_request.number }}/head

          COMMITS=$(gh pr view ${{ github.event.pull_request.number }} --json commits --jq '.commits[].oid')

          for COMMIT in $COMMITS; do
            # Extract both identities from the commit
            AUTHOR_EMAIL=$(git log -1 --format="%ae" $COMMIT)
            COMMITTER_EMAIL=$(git log -1 --format="%ce" $COMMIT)

            > ../allowed_signers

            # Map both the Author and Committer emails to every team key
            for KEY_FILE in ../team-sigs/*.txt; do
              if [ -f "$KEY_FILE" ]; then
                PUB_KEY=$(cat "$KEY_FILE")
                echo "$AUTHOR_EMAIL $PUB_KEY" >> ../allowed_signers
                echo "$COMMITTER_EMAIL $PUB_KEY" >> ../allowed_signers
              fi
            done

            git config gpg.ssh.allowedSignersFile ../allowed_signers

            if ! git verify-commit $COMMIT; then
              echo "❌ Error: Cryptographic verification failed for commit $COMMIT."
              exit 1
            fi

            echo "✅ Commit $COMMIT verified successfully."
          done
